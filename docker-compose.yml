services:
  n8n-postgres:
    image: postgres:16-alpine
    container_name: n8n-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?define POSTGRES_PASSWORD en .env}
      PGDATA: /var/lib/postgresql/data/pgdata
      TZ: ${GENERIC_TIMEZONE:-Europe/Madrid}
      PGTZ: ${GENERIC_TIMEZONE:-Europe/Madrid}
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - n8n_internal
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n}
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  n8n-app:
    image: n8nio/n8n:latest
    container_name: n8n-app
    restart: unless-stopped
    depends_on:
      n8n-postgres:
        condition: service_healthy
    environment:
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-Europe/Madrid}
      TZ: ${GENERIC_TIMEZONE:-Europe/Madrid}
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD:?define N8N_BASIC_AUTH_PASSWORD en .env}
      DB_TYPE: ${DB_TYPE:-postgresdb}
      DB_POSTGRESDB_HOST: ${DB_POSTGRESDB_HOST:-n8n-postgres}
      DB_POSTGRESDB_PORT: ${DB_POSTGRESDB_PORT:-5432}
      DB_POSTGRESDB_DATABASE: ${DB_POSTGRESDB_DATABASE:-n8n}
      DB_POSTGRESDB_USER: ${DB_POSTGRESDB_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${DB_POSTGRESDB_PASSWORD:?define DB_POSTGRESDB_PASSWORD en .env}
      N8N_HOST: ${N8N_HOST:-n8n.dedaniel.com}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-https}
    volumes:
      - ./n8n/data:/home/node/.n8n
    networks:
      - web
      - n8n_internal
    labels:
      traefik.enable: "true"
      traefik.docker.network: "web"
      traefik.http.routers.n8n.rule: "Host(`n8n.dedaniel.com`)"
      traefik.http.routers.n8n.entrypoints: "websecure"
      traefik.http.routers.n8n.tls.certresolver: "letsencrypt"
      traefik.http.services.n8n.loadbalancer.server.port: "5678"

networks:
  web:
    external: true
  n8n_internal:
    internal: true
